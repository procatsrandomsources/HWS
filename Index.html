<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horrorworks Studio | Developing The Void</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
        .glitch { position: relative; }
        .glitch::before, .glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8; }
        .glitch::before { color: #7f1d1d; z-index: -1; animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite; }
        .glitch::after { color: #4b5563; z-index: -2; animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse both infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }
        [x-cloak] { display: none !important; }
        body { background-color: #0a0a0a; color: #d1d5db; font-family: sans-serif; overflow-x: hidden; }
    </style>

    <script>
        // Define the app logic explicitly on the window object to ensure Alpine finds it
        window.hwsApp = function() {
            return {
                activeTab: 'home',
                isMobileMenuOpen: false,
                selectedProject: null,
                selectedDev: null,
                navItems: [
                    { id: 'home', label: 'Home', icon: 'gamepad-2' },
                    { id: 'team', label: 'Team', icon: 'users' },
                    { id: 'projects', label: 'Projects', icon: 'play-circle' },
                    { id: 'community', label: 'Community', icon: 'message-square' },
                ],
                team: [
                    { 
                        id: 'procat', 
                        name: 'Procat', 
                        role: 'Founder & Lead Dev', 
                        image: 'https://placehold.co/800x800/1f1f1f/7f1d1d?text=Procat', 
                        projects: ['Horror Works', 'RayWorks', 'WebGames', 'Ray Runners'], 
                        support: 'https://paypal.me/procat999', 
                        supportType: 'PayPal',
                        socials: { youtube: 'https://www.youtube.com/@ProcatRemade' },
                        email: 'Procat.help@gmail.com',
                        bio: 'A unity game dev who is also a artist content creator editor and animator'
                    },
                    { 
                        id: 'ray', 
                        name: 'Ray', 
                        role: 'Co-Founder & Developer', 
                        image: 'https://placehold.co/800x800/1f1f1f/4b5563?text=Ray', 
                        projects: ['Horror Works', 'Ray Runners', 'RayWorks'], 
                        support: 'https://cash.app/$Ray89210', 
                        supportType: 'CashApp',
                        socials: { youtube: 'https://www.youtube.com/@Ray_mc8921' },
                        email: 'Rayaltalt6@gmail.com',
                        bio: 'Artist 3d modeler content creator editor 3d animator'
                    },
                    { 
                        id: 'minty', 
                        name: 'Minty', 
                        role: 'Artist & Developer', 
                        image: 'https://placehold.co/800x800/1f1f1f/9ca3af?text=Minty', 
                        projects: ['Horror Works', 'RayWorks'], 
                        support: null, 
                        socials: { youtube: 'https://www.youtube.com/@Spearmint_GTVR' },
                        bio: 'Artist content creator editor 3d animator'
                    }
                ],
                projects: [
                    { 
                        id: 4, slug: 'webgames', name: 'WebGames', status: 'Active', category: 'active', icon: '🌐',
                        description: 'A curated collection of web-based experiences and experimental prototypes.',
                        contributors: ['Procat'],
                        image: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=800&auto=format&fit=crop',
                        youtubeUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                        media: [
                            'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800',
                            'https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=400',
                            'https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=400'
                        ]
                    },
                    { 
                        id: 3, slug: 'rayworks', name: 'RayWorks', status: 'In Development', category: 'active', icon: '🔥',
                        description: 'A massive upcoming collaboration merging atmospheric dread with high-octane mechanics.',
                        contributors: ['Procat', 'Ray', 'Minty'],
                        image: 'https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=800',
                        youtubeUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                        media: [
                            'https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=800',
                            'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=400',
                            'https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=400'
                        ]
                    },
                    { 
                        id: 1, slug: 'horror-works', name: 'Horror Works', status: 'Discontinued', category: 'archive', icon: '👁️',
                        description: 'Our flagship horror experience. No longer receiving active updates.',
                        contributors: ['Procat', 'Ray', 'Minty'],
                        image: 'https://images.unsplash.com/photo-1505633560263-90251e418c32?q=80&w=800',
                        youtubeUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
                        media: [
                            'https://images.unsplash.com/photo-1505633560263-90251e418c32?q=80&w=800',
                            'https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=400',
                            'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=400'
                        ]
                    }
                ],
                init() {
                    lucide.createIcons();
                    this.$watch('activeTab', () => {
                        this.$nextTick(() => lucide.createIcons());
                        window.scrollTo(0, 0);
                    });
                    this.$watch('selectedProject', (val) => {
                        if (val) this.$nextTick(() => lucide.createIcons());
                    });
                    this.$watch('selectedDev', (val) => {
                        if (val) this.$nextTick(() => lucide.createIcons());
                    });
                }
            }
        }
    </script>
    <!-- Load Alpine.js after the function is defined on the window -->
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="hwsApp()">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-40 bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex-shrink-0 cursor-pointer group" @click="activeTab = 'home'">
                <h1 class="text-xl font-black text-white italic tracking-tighter transition-all group-hover:text-[#7f1d1d]">
                    <span class="text-[#7f1d1d] group-hover:text-white">HWS</span> STUDIO
                </h1>
            </div>
            <div class="hidden md:flex space-x-1">
                <template x-for="item in navItems" :key="item.id">
                    <button @click="activeTab = item.id"
                        :class="activeTab === item.id ? 'text-white bg-[#7f1d1d]' : 'text-[#9ca3af] hover:text-white hover:bg-white/5'"
                        class="px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest flex items-center gap-2 transition-all">
                        <i :data-lucide="item.icon" class="w-3.5 h-3.5"></i>
                        <span x-text="item.label"></span>
                    </button>
                </template>
            </div>
            <button @click="isMobileMenuOpen = !isMobileMenuOpen" class="md:hidden p-2 text-[#9ca3af]">
                <i data-lucide="menu" x-show="!isMobileMenuOpen"></i>
                <i data-lucide="x" x-show="isMobileMenuOpen"></i>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div x-show="isMobileMenuOpen" x-cloak class="fixed inset-0 z-50 bg-[#0a0a0a] flex flex-col items-center justify-center space-y-8 p-4">
        <button @click="isMobileMenuOpen = false" class="absolute top-6 right-6 text-[#9ca3af]">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        <template x-for="item in navItems" :key="item.id">
            <button @click="activeTab = item.id; isMobileMenuOpen = false"
                class="text-4xl font-black italic uppercase tracking-tighter text-white hover:text-[#7f1d1d]"
                x-text="item.label"></button>
        </template>
    </div>

    <!-- Main Content -->
    <main class="pt-16 min-h-screen">
        
        <!-- Home Tab -->
        <div x-show="activeTab === 'home'" x-cloak class="animate-in fade-in duration-1000">
            <section class="relative h-[85vh] flex flex-col items-center justify-center overflow-hidden">
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_#7f1d1d20_0%,_transparent_70%)]"></div>
                <div class="text-center z-10 space-y-4">
                    <div class="flex gap-4 md:gap-12 justify-center mb-6">
                        <h2 class="glitch text-8xl md:text-[14rem] font-black text-white leading-none tracking-tighter" data-text="H">H</h2>
                        <h2 class="glitch text-8xl md:text-[14rem] font-black text-white leading-none tracking-tighter" data-text="W">W</h2>
                        <h2 class="glitch text-8xl md:text-[14rem] font-black text-white leading-none tracking-tighter" data-text="S">S</h2>
                    </div>
                    <p class="text-[#7f1d1d] font-black tracking-[0.6em] text-sm md:text-xl uppercase">Developing The Void</p>
                </div>
            </section>

            <div class="bg-[#7f1d1d] py-4 overflow-hidden border-y border-[#121212] relative z-20">
                <div class="animate-marquee whitespace-nowrap">
                    <template x-for="i in 10">
                        <span class="text-white text-xl font-black uppercase tracking-tighter mx-8 italic">
                            <span class="text-[#0a0a0a]">RAYRUNNERS</span> • 
                            <span class="text-[#d1d5db]"> WEBGAMES</span> • 
                            <span class="text-[#0a0a0a]"> HORRORWORKS</span> • 
                        </span>
                    </template>
                </div>
            </div>

            <section class="py-24 bg-[#0f0f0f] px-4">
                <div class="max-w-7xl mx-auto">
                    <h3 class="text-5xl font-black text-white uppercase italic tracking-tighter border-l-8 border-[#7f1d1d] pl-6 mb-12">Featured</h3>
                    <div class="grid md:grid-cols-1 max-w-4xl mx-auto gap-8">
                        <template x-for="p in projects.filter(x => x.category === 'active')" :key="p.id">
                            <div @click="selectedProject = p" class="group relative h-[500px] rounded-[3.5rem] overflow-hidden cursor-pointer border border-[#7f1d1d]/20">
                                <img :src="p.image" class="absolute inset-0 w-full h-full object-cover grayscale brightness-50 group-hover:grayscale-0 group-hover:brightness-100 transition-all duration-700">
                                <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-[#0a0a0a]/20 to-transparent"></div>
                                <div class="absolute bottom-12 left-12">
                                    <span class="text-xs font-black uppercase tracking-[0.5em] mb-2 block text-[#7f1d1d]" x-text="p.status"></span>
                                    <h4 class="text-6xl md:text-8xl font-black text-white uppercase italic tracking-tighter leading-none" x-text="p.name"></h4>
                                    <p class="text-gray-300 text-sm mt-4 font-medium max-w-md opacity-0 group-hover:opacity-100 transition-all duration-500 translate-y-4 group-hover:translate-y-0 italic" x-text="'&quot;' + p.description + '&quot;'"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </div>

        <!-- Team Tab -->
        <div x-show="activeTab === 'team'" x-cloak class="max-w-7xl mx-auto px-4 py-24">
            <h2 class="text-6xl font-black text-white italic tracking-tighter uppercase text-center mb-16">Personnel Dossier</h2>
            <div class="grid md:grid-cols-3 gap-8">
                <template x-for="dev in team" :key="dev.id">
                    <div @click="selectedDev = dev" class="group cursor-pointer bg-[#0f0f0f] border border-white/5 p-12 rounded-[3rem] hover:border-[#7f1d1d] transition-all text-center">
                        <img :src="dev.image" class="w-36 h-36 rounded-[2rem] object-cover mx-auto mb-8 grayscale group-hover:grayscale-0 transition-all">
                        <h3 class="text-3xl font-black text-white italic uppercase tracking-tighter" x-text="dev.name"></h3>
                        <p class="text-[#7f1d1d] text-[10px] font-black uppercase tracking-[0.3em] mb-6 mt-1" x-text="dev.role"></p>
                    </div>
                </template>
            </div>
        </div>

        <!-- Projects Tab -->
        <div x-show="activeTab === 'projects'" x-cloak class="max-w-7xl mx-auto px-4 py-24">
            <h2 class="text-6xl font-black text-white italic tracking-tighter uppercase mb-12 border-l-8 border-[#7f1d1d] pl-8">All Projects</h2>
            <div class="grid md:grid-cols-3 gap-8">
                <template x-for="p in projects" :key="p.id">
                    <div @click="selectedProject = p" class="group cursor-pointer bg-[#0f0f0f] border border-white/5 rounded-[2.5rem] overflow-hidden hover:border-[#7f1d1d] transition-all">
                        <div class="h-64 bg-black overflow-hidden relative">
                            <img :src="p.image" class="w-full h-full object-cover grayscale brightness-50 group-hover:brightness-100 group-hover:grayscale-0 transition-all duration-500">
                        </div>
                        <div class="p-10">
                            <h3 class="text-3xl font-black text-white uppercase italic mb-2 tracking-tighter" x-text="p.name"></h3>
                            <p class="text-[#9ca3af] text-sm italic opacity-60" x-text="'&quot;' + p.description + '&quot;'"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Community Tab -->
        <div x-show="activeTab === 'community'" x-cloak class="max-w-5xl mx-auto px-4 py-12 h-[750px] flex gap-6 flex-col md:flex-row">
            <!-- Simplified Discord Mockup -->
            <div class="w-full md:w-64 bg-[#111214] rounded-3xl p-4 flex flex-col border border-white/5">
                <h3 class="text-white font-black text-xs uppercase mb-4">HWS Community</h3>
                <div class="space-y-2 flex-grow">
                    <div class="text-[#949ba4] text-[10px] font-bold uppercase">Channels</div>
                    <div class="bg-[#3f4147] text-white p-2 rounded text-xs font-bold uppercase tracking-tight flex items-center gap-2"># Welcome</div>
                    <div class="text-[#949ba4] p-2 rounded text-xs font-bold uppercase tracking-tight flex items-center gap-2"># Announcements</div>
                    <div class="text-[#949ba4] p-2 rounded text-xs font-bold uppercase tracking-tight flex items-center gap-2"># General-Yap</div>
                </div>
            </div>
            <!-- Discord Widget -->
            <div class="flex-grow bg-[#313338] rounded-3xl overflow-hidden relative border border-white/5">
                <iframe src="https://discord.com/widget?id=1230191838933258350&theme=dark" width="100%" height="100%" allowtransparency="true" frameBorder="0" sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts"></iframe>
                <div class="absolute bottom-6 right-6">
                    <a href="https://discord.gg/BrC2WqhxxT" target="_blank" class="bg-[#5865f2] text-white px-6 py-3 rounded-xl font-black text-xs uppercase tracking-tighter flex items-center gap-2">
                        Join Discord
                    </a>
                </div>
            </div>
        </div>

    </main>

    <!-- Project Modal -->
    <template x-if="selectedProject">
        <div class="fixed inset-0 z-50 bg-black flex flex-col overflow-y-auto">
            <div class="sticky top-0 z-[60] bg-black/90 backdrop-blur-xl border-b border-white/5 p-6 flex justify-between items-center px-10">
                <div class="flex items-center gap-6">
                    <div class="w-12 h-12 bg-[#7f1d1d] rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-[#7f1d1d]/20" x-text="selectedProject.icon"></div>
                    <div>
                        <h2 class="text-2xl font-black text-white uppercase italic tracking-tighter" x-text="selectedProject.name"></h2>
                        <span class="text-[9px] font-black text-[#7f1d1d] uppercase tracking-[0.4em] mt-1 block" x-text="selectedProject.status"></span>
                    </div>
                </div>
                <button @click="selectedProject = null" class="p-4 bg-white/5 hover:bg-[#7f1d1d] text-white rounded-full">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <div class="flex-grow flex flex-col lg:flex-row">
                <div class="lg:w-2/3 p-6 md:p-12 space-y-12">
                    <!-- Video -->
                    <div class="aspect-video bg-black rounded-[3rem] overflow-hidden border border-white/5">
                        <iframe class="w-full h-full" :src="selectedProject.youtubeUrl" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <!-- 1 Rect + 2 Squares Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 h-auto md:h-80">
                        <div class="md:col-span-2 rounded-[2.5rem] overflow-hidden border border-white/5">
                            <img :src="selectedProject.media[0]" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700">
                        </div>
                        <div class="flex flex-col gap-4">
                            <div class="flex-1 rounded-[2.5rem] overflow-hidden border border-white/5">
                                <img :src="selectedProject.media[1]" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700">
                            </div>
                            <div class="flex-1 rounded-[2.5rem] overflow-hidden border border-white/5">
                                <img :src="selectedProject.media[2]" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700">
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Sidebar Info -->
                <div class="lg:w-1/3 p-8 md:p-12 bg-[#0a0a0a] lg:border-l border-white/5 space-y-12">
                    <section>
                        <h3 class="text-[10px] font-black text-[#7f1d1d] uppercase tracking-[0.5em] mb-4">Mission Briefing</h3>
                        <p class="text-2xl font-black text-white italic tracking-tighter" x-text="'&quot;' + selectedProject.description + '&quot;'"></p>
                    </section>
                    <section>
                        <h3 class="text-[10px] font-black text-[#4b5563] uppercase tracking-[0.5em] mb-4">Personnel</h3>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="c in selectedProject.contributors">
                                <span class="px-4 py-2 bg-[#0f0f0f] border border-white/5 rounded-xl text-[10px] font-black text-white uppercase italic" x-text="c"></span>
                            </template>
                        </div>
                    </section>
                    <div class="pt-12">
                        <a href="https://horrorworksstudios.itch.io/" target="_blank" class="block text-center bg-white text-black py-6 rounded-[2.5rem] font-black uppercase text-xs tracking-widest hover:bg-[#7f1d1d] hover:text-white transition-all">
                            Access Store Page
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Dev Modal -->
    <template x-if="selectedDev">
        <div class="fixed inset-0 z-50 bg-black flex flex-col lg:flex-row animate-in fade-in duration-300">
            <div class="lg:w-1/2 h-[50vh] lg:h-screen relative">
                <img :src="selectedDev.image" class="w-full h-full object-cover grayscale brightness-50">
                <div class="absolute bottom-12 left-12">
                    <h1 class="text-7xl font-black text-white italic uppercase tracking-tighter leading-none" x-text="selectedDev.name"></h1>
                    <p class="text-2xl font-black text-[#7f1d1d] uppercase italic mt-4" x-text="selectedDev.role"></p>
                </div>
                <button @click="selectedDev = null" class="absolute top-8 right-8 p-4 bg-white/5 rounded-full text-white">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="lg:w-1/2 p-12 md:p-24 space-y-12 overflow-y-auto">
                <section>
                    <h3 class="text-[10px] font-black text-[#4b5563] uppercase tracking-[0.4em] mb-4">Background</h3>
                    <p class="text-4xl font-black text-white italic tracking-tighter" x-text="'&quot;' + selectedDev.bio + '&quot;'"></p>
                </section>
                <section x-show="selectedDev.support" class="bg-[#0f0f0f] p-8 rounded-[2.5rem] border border-[#7f1d1d]/30">
                    <h4 class="text-xl font-black text-white italic uppercase mb-4" x-text="selectedDev.supportType + ' Gateway'"></h4>
                    <a :href="selectedDev.support" target="_blank" class="block text-center bg-[#d1d5db] text-black py-4 rounded-xl font-black uppercase text-xs tracking-widest">Support Developer</a>
                </section>
                <div class="flex gap-4">
                    <template x-if="selectedDev.socials.youtube">
                        <a :href="selectedDev.socials.youtube" target="_blank" class="flex-1 p-6 bg-[#151515] rounded-2xl border border-white/5 text-center text-white font-black uppercase italic text-xs tracking-widest">YouTube</a>
                    </template>
                    <template x-if="selectedDev.email">
                        <a :href="'mailto:' + selectedDev.email" class="flex-1 p-6 bg-[#151515] rounded-2xl border border-white/5 text-center text-white font-black uppercase italic text-xs tracking-widest">Email</a>
                    </template>
                </div>
            </div>
        </div>
    </template>

</body>
</html>
