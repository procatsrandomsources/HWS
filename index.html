    <style>
        @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
        .glitch { position: relative; }
        .glitch::before, .glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8; }
        .glitch::before { color: #7f1d1d; z-index: -1; animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite; }
        .glitch::after { color: #4b5563; z-index: -2; animation: glitch 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse both infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }
        [x-cloak] { display: none !important; }
        body { background-color: #0a0a0a; color: #d1d5db; font-family: sans-serif; overflow-x: hidden; width: 100vw; }
        
        /* Custom scrollbar for mobile feel */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #7f1d1d; border-radius: 10px; }

        /* Ensure smooth scrolling */
        html { scroll-behavior: smooth; }
    </style>

                        } else {
                            document.body.style.overflow = 'auto';
                        }

<body x-data="hwsApp()">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-40 bg-[#0a0a0a]/90 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex-shrink-0 cursor-pointer group" @click="activeTab = 'home'">
                <h1 class="text-xl font-black text-white italic tracking-tighter transition-all group-hover:text-[#7f1d1d]">
                    <span class="text-[#7f1d1d] group-hover:text-white">HWS</span> STUDIO
                </h1>
            </div>
            
            <!-- Desktop Nav -->
            <div class="hidden md:flex space-x-1">
                <template x-for="item in navItems" :key="item.id">
                    <button @click="activeTab = item.id"
                        :class="activeTab === item.id ? 'text-white bg-[#7f1d1d]' : 'text-[#9ca3af] hover:text-white hover:bg-white/5'"
                        class="px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest flex items-center gap-2 transition-all">
                        <i :data-lucide="item.icon" class="w-3.5 h-3.5"></i>
                        <span x-text="item.label"></span>
                    </button>
                </template>
            </div>

            <!-- Mobile Menu Button -->
            <button @click="isMobileMenuOpen = !isMobileMenuOpen" class="md:hidden p-2 text-[#9ca3af] hover:text-white transition-colors" aria-label="Toggle Menu">
                <i data-lucide="menu" x-show="!isMobileMenuOpen" class="w-6 h-6"></i>
                <i data-lucide="x" x-show="isMobileMenuOpen" class="w-6 h-6"></i>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div x-show="isMobileMenuOpen" 
         x-cloak 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-[-20px]"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-[-20px]"
         class="fixed inset-0 z-50 bg-[#0a0a0a] flex flex-col items-center justify-center p-6">
        
        <button @click="isMobileMenuOpen = false" class="absolute top-6 right-6 text-[#9ca3af] hover:text-white">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>

        <div class="flex flex-col items-center space-y-2 w-full">
            <template x-for="item in navItems" :key="item.id">
                <button @click="activeTab = item.id; isMobileMenuOpen = false"
                    class="text-4xl font-black italic uppercase tracking-tighter transition-colors w-full text-center py-4 flex flex-col items-center"
                    :class="activeTab === item.id ? 'text-[#7f1d1d]' : 'text-white hover:text-[#7f1d1d]'">
                    <span x-text="item.label"></span>
                    <span x-show="activeTab === item.id" class="w-12 h-1 bg-[#7f1d1d] mt-1"></span>
                </button>
            </template>
        </div>
        
        <div class="absolute bottom-12 w-full text-center px-6">
            <p class="text-[#7f1d1d] font-black text-xs uppercase tracking-[0.4em]">Horrorworks Studio</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="pt-16 min-h-screen">
        
        <!-- Home Tab -->
        <div x-show="activeTab === 'home'" x-cloak class="animate-in fade-in duration-700">
            <section class="relative h-[60vh] md:h-[85vh] flex flex-col items-center justify-center overflow-hidden px-4">
                <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_#7f1d1d30_0%,_transparent_70%)] opacity-60"></div>
                <div class="text-center z-10 space-y-4">
                    <div class="flex gap-4 md:gap-12 justify-center mb-6">
                        <h2 class="glitch text-8xl md:text-[14rem] font-black text-white leading-none tracking-tighter" data-text="H">H</h2>
                        <h2 class="glitch text-8xl md:text-[14rem] font-black text-white leading-none tracking-tighter" data-text="W">W</h2>
                        <h2 class="glitch text-8xl md:text-[14rem] font-black text-white leading-none tracking-tighter" data-text="S">S</h2>
                    </div>
                    <p class="text-[#7f1d1d] font-black tracking-[0.3em] md:tracking-[0.6em] text-xs md:text-xl uppercase bg-black/40 px-4 py-1 inline-block">Developing The Void</p>
                </div>
            </section>

                            <span class="text-[#0a0a0a]"> HORRORWORKS</span> •

            </div>

                        <div class="relative w-32 h-32 md:w-36 md:h-36 mx-auto mb-6 md:mb-8">

                <div class="p-6 bg-[#2b2d31]/80 backdrop-blur-md md:absolute md:bottom-8 md:right-8 w-full md:w-auto">
                    <a href="https://discord.gg/BrC2WqhxxT" target="_blank" class="w-full md:w-auto bg-[#5865f2] text-white px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-tighter flex items-center justify-center gap-3 shadow-2xl hover:bg-[#4752c4] transition-colors">
                        <i data-lucide="message-square" class="w-4 h-4"></i> Join Server
                    </a>
                </div>
            </div>
        </div>

    </main>

    <!-- Project Modal (Mobile Optimized) -->
    <template x-if="selectedProject">
        <div class="fixed inset-0 z-[100] bg-black flex flex-col overflow-y-auto">
            <div class="sticky top-0 z-[110] bg-black/95 backdrop-blur-xl border-b border-white/5 p-4 md:p-6 flex justify-between items-center px-4 md:px-10">
                <div class="flex items-center gap-3 md:gap-6">
                    <div class="w-10 h-10 md:w-12 md:h-12 bg-[#7f1d1d] rounded-xl md:rounded-2xl flex items-center justify-center text-xl md:text-2xl shadow-lg" x-text="selectedProject.icon"></div>
                    <div>
                        <h2 class="text-lg md:text-2xl font-black text-white uppercase italic tracking-tighter" x-text="selectedProject.name"></h2>
                        <span class="text-[8px] md:text-[9px] font-black text-[#7f1d1d] uppercase tracking-[0.4em] block" x-text="selectedProject.status"></span>
                    </div>
                </div>
                <button @click="selectedProject = null" class="p-3 md:p-4 bg-white/5 hover:bg-[#7f1d1d] text-white rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5 md:w-6 md:h-6"></i>
                </button>
            </div>

            <div class="flex-grow flex flex-col lg:flex-row pb-12 lg:pb-0">
                <div class="lg:w-2/3 p-4 md:p-12 space-y-8 md:space-y-12">
                    <!-- Video -->
                    <div class="aspect-video bg-black rounded-[1.5rem] md:rounded-[3rem] overflow-hidden border border-white/5 shadow-2xl relative">
                        <iframe class="w-full h-full" :src="selectedProject.youtubeUrl" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <!-- Media Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-2 rounded-[1.5rem] md:rounded-[2.5rem] overflow-hidden border border-white/5 aspect-video shadow-lg">
                            <img :src="selectedProject.media[0]" class="w-full h-full object-cover">
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-1 gap-4">
                            <div class="rounded-[1.2rem] md:rounded-[2.5rem] overflow-hidden border border-white/5 aspect-square shadow-lg">
                                <img :src="selectedProject.media[1]" class="w-full h-full object-cover">
                            </div>
                            <div class="rounded-[1.2rem] md:rounded-[2.5rem] overflow-hidden border border-white/5 aspect-square shadow-lg">
                                <img :src="selectedProject.media[2]" class="w-full h-full object-cover">
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Sidebar -->
                <div class="lg:w-1/3 p-6 md:p-12 bg-[#0a0a0a] lg:border-l border-white/5 space-y-10 md:space-y-12">
                    <section>
                        <h3 class="text-[9px] font-black text-[#7f1d1d] uppercase tracking-[0.5em] mb-4">Description</h3>
                        <p class="text-xl md:text-3xl font-black text-white italic tracking-tighter leading-tight" x-text="'&quot;' + selectedProject.description + '&quot;'"></p>
                    </section>
                    <section>
                        <h3 class="text-[9px] font-black text-[#4b5563] uppercase tracking-[0.5em] mb-4">Personnel</h3>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="c in selectedProject.contributors">
                                <span class="px-4 py-2 bg-[#0f0f0f] border border-white/5 rounded-xl text-[10px] font-black text-white uppercase italic tracking-widest" x-text="c"></span>
                            </template>
                        </div>
                    </section>
                    <div class="pt-6">
                        <a href="https://horrorworksstudios.itch.io/" target="_blank" class="block text-center bg-white text-black py-5 md:py-6 rounded-[1.5rem] md:rounded-[2.5rem] font-black uppercase text-[10px] md:text-xs tracking-[0.2em] hover:bg-[#7f1d1d] hover:text-white transition-all shadow-xl active:scale-95">
                            Access Store Page
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Dev Modal (Mobile Optimized) -->
    <template x-if="selectedDev">
        <div class="fixed inset-0 z-[100] bg-black flex flex-col lg:flex-row overflow-y-auto">
            <div class="lg:w-1/2 h-[50vh] lg:h-screen relative shrink-0">
                <img :src="selectedDev.image" class="w-full h-full object-cover grayscale brightness-[0.3]">
                <div class="absolute bottom-8 left-8 md:bottom-12 md:left-12 pr-8">
                    <h1 class="text-6xl md:text-8xl font-black text-white italic uppercase tracking-tighter leading-none" x-text="selectedDev.name"></h1>
                    <p class="text-xl md:text-2xl font-black text-[#7f1d1d] uppercase italic mt-4" x-text="selectedDev.role"></p>
                </div>
                <button @click="selectedDev = null" class="absolute top-6 right-6 md:top-8 md:right-8 p-3 md:p-4 bg-white/10 backdrop-blur-md rounded-full text-white z-10 hover:bg-[#7f1d1d]">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="lg:w-1/2 p-8 md:p-24 space-y-12">
                <section>
                    <h3 class="text-[10px] font-black text-[#4b5563] uppercase tracking-[0.5em] mb-6">Background Intel</h3>
                    <p class="text-2xl md:text-4xl font-black text-white italic tracking-tighter leading-tight" x-text="'&quot;' + selectedDev.bio + '&quot;'"></p>
                </section>
                
                <section x-show="selectedDev.support" class="bg-[#0f0f0f] p-8 rounded-[2rem] border border-[#7f1d1d]/30 shadow-2xl">
                    <h4 class="text-xl font-black text-white italic uppercase mb-6 flex items-center gap-3">
                        <i data-lucide="wallet" class="w-5 h-5 text-[#7f1d1d]"></i>
                        <span x-text="selectedDev.supportType + ' Gateway'"></span>
                    </h4>
                    <a :href="selectedDev.support" target="_blank" class="block text-center bg-[#d1d5db] text-black py-5 rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition-transform hover:bg-white">Support Developer</a>
                </section>

                <div class="flex flex-col sm:flex-row gap-4">
                    <template x-if="selectedDev.socials.youtube">
                        <a :href="selectedDev.socials.youtube" target="_blank" class="flex-1 p-6 bg-[#151515] rounded-2xl border border-white/5 text-center text-white font-black uppercase italic text-xs tracking-widest hover:border-[#7f1d1d] transition-all flex items-center justify-center gap-2">
                            <i data-lucide="youtube" class="w-4 h-4"></i> YouTube
                        </a>
                    </template>
                    <template x-if="selectedDev.email">
                        <a :href="'mailto:' + selectedDev.email" class="flex-1 p-6 bg-[#151515] rounded-2xl border border-white/5 text-center text-white font-black uppercase italic text-xs tracking-widest hover:border-[#7f1d1d] transition-all flex items-center justify-center gap-2">
                            <i data-lucide="mail" class="w-4 h-4"></i> Secure Line
                        </a>
                    </template>
                </div>
            </div>
        </div>
    </template>

</body>
</html>
